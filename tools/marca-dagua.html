<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marca d'água — Sindicompany Hub</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="/logo.svg">
<link rel="stylesheet" href="/assets/shared.css">
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
</head>
<body>
<div id="app-nav"></div>
<div class="container">
  <section class="tool-hero">
    <span class="eyebrow">💧 Organização</span>
    <h1>Marca d'água</h1>
    <p>Adicione um texto como marca d'água em todas as páginas do PDF — útil pra "CONFIDENCIAL", "RASCUNHO", "CÓPIA", etc.</p>
  </section>

  <div class="card">
    <label for="fileInput" class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <div class="drop-title">Arraste o PDF aqui ou clique para selecionar</div>
      <div class="drop-sub">Aceita 1 arquivo PDF</div>
    </label>
    <input type="file" id="fileInput" accept="application/pdf">

    <div id="fileInfo" style="display:none;margin-top:12px;padding:12px 14px;background:var(--bg-elev);border-radius:10px;font-size:13px;color:var(--text-dim);"></div>

    <div id="options" style="display:none;margin-top:18px;">
      <div class="field">
        <label>Texto da marca d'água</label>
        <input type="text" id="text" placeholder="CONFIDENCIAL" value="CONFIDENCIAL">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Posição</label>
          <select id="position">
            <option value="diagonal" selected>Diagonal (atravessa)</option>
            <option value="center">Centro</option>
            <option value="top">Topo</option>
            <option value="bottom">Rodapé</option>
          </select>
        </div>
        <div class="field">
          <label>Tamanho</label>
          <select id="size">
            <option value="40">Pequeno</option>
            <option value="64" selected>Médio</option>
            <option value="96">Grande</option>
            <option value="128">Gigante</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Cor</label>
          <select id="color">
            <option value="gray" selected>Cinza</option>
            <option value="red">Vermelha</option>
            <option value="blue">Azul</option>
            <option value="black">Preta</option>
          </select>
        </div>
        <div class="field">
          <label>Opacidade</label>
          <select id="opacity">
            <option value="0.15">Muito leve (15%)</option>
            <option value="0.30" selected>Leve (30%)</option>
            <option value="0.50">Média (50%)</option>
            <option value="0.80">Forte (80%)</option>
          </select>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="processBtn" disabled>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      <span id="btnText">Selecione um PDF</span>
    </button>

    <div class="status" id="status">
      <div class="status-text">Aguardando…</div>
      <div class="progress"><div class="progress-bar"></div></div>
    </div>
  </div>
</div>
<div id="app-footer"></div>

<script src="/assets/shared.js"></script>
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const opts = document.getElementById('options');
const processBtn = document.getElementById('processBtn');
const btnText = document.getElementById('btnText');
const statusEl = document.getElementById('status');

let file = null;

const COLORS = {
  gray: PDFLib.rgb(0.5, 0.5, 0.5),
  red: PDFLib.rgb(0.85, 0.15, 0.15),
  blue: PDFLib.rgb(0.15, 0.35, 0.85),
  black: PDFLib.rgb(0, 0, 0),
};

setupDropZone(dropZone, fileInput, async newFiles => {
  file = newFiles[0];
  if (!file) return;
  fileInfo.style.display = 'block';
  fileInfo.innerHTML = `<strong>${file.name}</strong> · ${formatBytes(file.size)}`;
  opts.style.display = 'block';
  processBtn.disabled = false;
  btnText.textContent = 'Adicionar marca d\'água';
});

processBtn.addEventListener('click', async () => {
  if (!file) return;
  processBtn.disabled = true;
  btnText.textContent = 'Processando…';
  showStatus(statusEl, 'Lendo PDF…');
  setProgress(statusEl, 10);

  try {
    const buf = await file.arrayBuffer();
    const doc = await PDFLib.PDFDocument.load(buf, { ignoreEncryption: true });
    const font = await doc.embedFont(PDFLib.StandardFonts.HelveticaBold);

    const text = (document.getElementById('text').value || 'CONFIDENCIAL').trim();
    const position = document.getElementById('position').value;
    const size = parseFloat(document.getElementById('size').value);
    const color = COLORS[document.getElementById('color').value];
    const opacity = parseFloat(document.getElementById('opacity').value);

    setProgress(statusEl, 30);
    const pages = doc.getPages();
    pages.forEach((page) => {
      const { width, height } = page.getSize();
      const textWidth = font.widthOfTextAtSize(text, size);

      let x, y, rotate;
      if (position === 'diagonal') {
        x = width / 2 - textWidth / 2;
        y = height / 2 - size / 2;
        rotate = PDFLib.degrees(45);
        x = width / 2 - (textWidth * Math.SQRT1_2) / 2;
        y = height / 2 - (textWidth * Math.SQRT1_2) / 2;
      } else if (position === 'center') {
        x = (width - textWidth) / 2;
        y = (height - size) / 2;
        rotate = PDFLib.degrees(0);
      } else if (position === 'top') {
        x = (width - textWidth) / 2;
        y = height - size - 40;
        rotate = PDFLib.degrees(0);
      } else {
        x = (width - textWidth) / 2;
        y = 40;
        rotate = PDFLib.degrees(0);
      }

      page.drawText(text, { x, y, size, font, color, opacity, rotate });
    });

    setProgress(statusEl, 90);
    const out = await doc.save();
    const blob = new Blob([out], { type: 'application/pdf' });
    const baseName = file.name.replace(/\.pdf$/i, '');
    downloadBlob(blob, `${baseName}_marca-dagua.pdf`);

    setProgress(statusEl, 100);
    showStatus(statusEl, `✓ Pronto! Marca d'água "${text}" adicionada em ${pages.length} páginas.`, 'success');
  } catch (err) {
    console.error(err);
    showStatus(statusEl, 'Erro: ' + err.message, 'error');
    setProgress(statusEl, 0);
  } finally {
    processBtn.disabled = false;
    btnText.textContent = 'Adicionar marca d\'água';
  }
});
</script>
</body>
</html>
