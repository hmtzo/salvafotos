<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>Comprimir PDF — Sindicompany Hub</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/logo.svg">
<link rel="stylesheet" href="/assets/shared.css">
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
<div id="app-nav"></div>
<div class="container">
  <section class="tool-hero">
    <span class="eyebrow">🗜️ PDF</span>
    <h1>Comprimir PDF</h1>
    <p>Reduza o tamanho do PDF rasterizando as páginas em JPEG. Funciona melhor em PDFs com imagens/escaneados.</p>
  </section>

  <div class="card">
    <label for="fileInput" class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
      </div>
      <div class="drop-title">Arraste o PDF aqui ou clique para selecionar</div>
      <div class="drop-sub">Aceita 1 arquivo PDF</div>
    </label>
    <input type="file" id="fileInput" accept="application/pdf">

    <div id="fileInfo" style="display:none;margin-top:12px;padding:12px 14px;background:var(--bg-elev);border-radius:10px;font-size:13px;color:var(--text-dim);"></div>

    <div id="options" style="display:none;margin-top:18px;">
      <div class="field">
        <label>Nível de compressão</label>
        <select id="level">
          <option value="high">Alta — máxima compressão (qualidade média)</option>
          <option value="medium" selected>Média — bom equilíbrio (recomendado)</option>
          <option value="low">Leve — qualidade alta, menor compressão</option>
        </select>
      </div>
      <p style="font-size:12px;color:var(--text-muted);">⚠️ Compressão por rasterização: o texto vira imagem. Não use se precisa selecionar texto depois.</p>
    </div>

    <button class="btn-primary" id="processBtn" disabled>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
      <span id="btnText">Selecione um PDF</span>
    </button>

    <div class="status" id="status">
      <div class="status-text">Aguardando…</div>
      <div class="progress"><div class="progress-bar"></div></div>
    </div>
  </div>
</div>
<div id="app-footer"></div>

<script src="/assets/shared.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const opts = document.getElementById('options');
const processBtn = document.getElementById('processBtn');
const btnText = document.getElementById('btnText');
const statusEl = document.getElementById('status');

let file = null;
let originalSize = 0;

const LEVELS = {
  high:   { scale: 1.0, quality: 0.55 },
  medium: { scale: 1.3, quality: 0.72 },
  low:    { scale: 1.6, quality: 0.85 },
};

setupDropZone(dropZone, fileInput, newFiles => {
  file = newFiles[0];
  if (!file) return;
  originalSize = file.size;
  fileInfo.style.display = 'block';
  fileInfo.innerHTML = `<strong>${file.name}</strong> · ${formatBytes(file.size)}`;
  opts.style.display = 'block';
  processBtn.disabled = false;
  btnText.textContent = 'Comprimir PDF';
});

processBtn.addEventListener('click', async () => {
  if (!file) return;
  processBtn.disabled = true;
  btnText.textContent = 'Processando…';
  showStatus(statusEl, 'Lendo PDF…');
  setProgress(statusEl, 5);

  try {
    const level = document.getElementById('level').value;
    const { scale, quality } = LEVELS[level];

    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const totalPages = pdf.numPages;

    const out = await PDFLib.PDFDocument.create();

    for (let i = 1; i <= totalPages; i++) {
      showStatus(statusEl, `Comprimindo página ${i}/${totalPages}…`);
      setProgress(statusEl, 5 + (i / totalPages) * 85);

      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      await page.render({ canvasContext: ctx, viewport }).promise;
      const jpegDataUrl = canvas.toDataURL('image/jpeg', quality);
      const jpegBytes = await fetch(jpegDataUrl).then(r => r.arrayBuffer());

      const img = await out.embedJpg(jpegBytes);
      const pdfPage = out.addPage([viewport.width, viewport.height]);
      pdfPage.drawImage(img, { x: 0, y: 0, width: viewport.width, height: viewport.height });

      await new Promise(r => setTimeout(r, 0));
    }

    showStatus(statusEl, 'Salvando…');
    setProgress(statusEl, 95);
    const pdfBytes = await out.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const baseName = file.name.replace(/\.pdf$/i, '');
    downloadBlob(blob, `${baseName}_comprimido.pdf`);

    setProgress(statusEl, 100);
    const reduction = ((1 - blob.size / originalSize) * 100).toFixed(0);
    if (blob.size < originalSize) {
      showStatus(statusEl, `✓ Pronto! ${formatBytes(originalSize)} → ${formatBytes(blob.size)} (${reduction}% menor).`, 'success');
      trackUsage('comprimir-pdf', { reduction });
    } else {
      showStatus(statusEl, `⚠ Arquivo gerado: ${formatBytes(blob.size)}. Esse PDF não tinha como ser comprimido mais — talvez já esteja otimizado.`, '');
    }
  } catch (err) {
    console.error(err);
    showStatus(statusEl, 'Erro: ' + err.message, 'error');
    setProgress(statusEl, 0);
  } finally {
    processBtn.disabled = false;
    btnText.textContent = 'Comprimir PDF';
  }
});
</script>
</body>
</html>
