<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → JPG — Sindicompany Hub</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="/logo.svg">
<link rel="stylesheet" href="/assets/shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
<div id="app-nav"></div>
<div class="container">
  <section class="tool-hero">
    <span class="eyebrow">🖼️ PDF</span>
    <h1>PDF → JPG</h1>
    <p>Converta cada página do PDF em uma imagem JPG. Útil pra mandar pelo WhatsApp ou inserir em outros documentos.</p>
  </section>

  <div class="card">
    <label for="fileInput" class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      </div>
      <div class="drop-title">Arraste o PDF aqui ou clique para selecionar</div>
      <div class="drop-sub">Aceita 1 arquivo PDF</div>
    </label>
    <input type="file" id="fileInput" accept="application/pdf">

    <div id="fileInfo" style="display:none;margin-top:12px;padding:12px 14px;background:var(--bg-elev);border-radius:10px;font-size:13px;color:var(--text-dim);"></div>

    <div id="options" style="display:none;margin-top:18px;">
      <div class="field-row">
        <div class="field">
          <label>Qualidade</label>
          <select id="quality">
            <option value="0.7">Padrão (mais leve)</option>
            <option value="0.85" selected>Alta (recomendado)</option>
            <option value="0.95">Máxima</option>
          </select>
        </div>
        <div class="field">
          <label>Resolução</label>
          <select id="scale">
            <option value="1.5">Tela (1.5x)</option>
            <option value="2" selected>Impressão (2x)</option>
            <option value="3">Alta (3x)</option>
          </select>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="processBtn" disabled>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
      <span id="btnText">Selecione um PDF</span>
    </button>

    <div class="status" id="status">
      <div class="status-text">Aguardando…</div>
      <div class="progress"><div class="progress-bar"></div></div>
    </div>
  </div>
</div>
<div id="app-footer"></div>

<script src="/assets/shared.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const opts = document.getElementById('options');
const processBtn = document.getElementById('processBtn');
const btnText = document.getElementById('btnText');
const statusEl = document.getElementById('status');

let file = null;

setupDropZone(dropZone, fileInput, newFiles => {
  file = newFiles[0];
  if (!file) return;
  fileInfo.style.display = 'block';
  fileInfo.innerHTML = `<strong>${file.name}</strong> · ${formatBytes(file.size)}`;
  opts.style.display = 'block';
  processBtn.disabled = false;
  btnText.textContent = 'Converter para JPG';
});

processBtn.addEventListener('click', async () => {
  if (!file) return;
  processBtn.disabled = true;
  btnText.textContent = 'Processando…';
  showStatus(statusEl, 'Lendo PDF…');
  setProgress(statusEl, 5);

  try {
    const quality = parseFloat(document.getElementById('quality').value);
    const scale = parseFloat(document.getElementById('scale').value);

    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const total = pdf.numPages;

    const zip = new JSZip();
    const baseName = file.name.replace(/\.pdf$/i, '');

    for (let i = 1; i <= total; i++) {
      showStatus(statusEl, `Convertendo página ${i}/${total}…`);
      setProgress(statusEl, 5 + (i / total) * 85);
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport }).promise;
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
      const arrBuf = await blob.arrayBuffer();
      const padded = String(i).padStart(String(total).length, '0');
      zip.file(`${baseName}_pag-${padded}.jpg`, arrBuf);
      await new Promise(r => setTimeout(r, 0));
    }

    showStatus(statusEl, 'Compactando…');
    setProgress(statusEl, 95);
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    downloadBlob(zipBlob, `${baseName}_jpg.zip`);

    setProgress(statusEl, 100);
    showStatus(statusEl, `✓ Pronto! ${total} imagens em ${formatBytes(zipBlob.size)}.`, 'success');
    trackUsage('pdf-para-jpg', { pages: total });
  } catch (err) {
    console.error(err);
    showStatus(statusEl, 'Erro: ' + err.message, 'error');
    setProgress(statusEl, 0);
  } finally {
    processBtn.disabled = false;
    btnText.textContent = 'Converter para JPG';
  }
});
</script>
</body>
</html>
