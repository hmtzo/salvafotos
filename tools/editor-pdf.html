<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de PDF — Sindicompany Hub</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="/logo.svg">
<link rel="stylesheet" href="/assets/shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
  .editor-shell{display:grid;grid-template-columns:200px 1fr;gap:14px}
  @media(max-width:800px){.editor-shell{grid-template-columns:1fr}}

  .toolbar{
    background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;
    display:flex;flex-direction:column;gap:6px;height:fit-content;position:sticky;top:18px;
  }
  .toolbar h4{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin:8px 0 4px}
  .toolbar h4:first-child{margin-top:0}
  .tool-btn{
    display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-elev);
    border:1.5px solid transparent;border-radius:8px;cursor:pointer;font-size:13px;
    color:var(--text);font-family:inherit;transition:all 0.15s;text-align:left;
  }
  .tool-btn:hover{border-color:var(--border-bright)}
  .tool-btn.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent-bright)}
  .tool-btn .icon{font-size:16px}

  .canvas-area{
    background:var(--bg-elev);border-radius:12px;padding:18px;
    overflow:auto;max-height:80vh;
  }
  .page-wrap{
    background:white;box-shadow:0 4px 16px rgba(0,0,0,0.1);
    margin:0 auto 18px;position:relative;cursor:crosshair;
  }
  .page-wrap canvas{display:block}
  .page-wrap.tool-pan{cursor:grab}
  .page-wrap .page-num{
    position:absolute;top:-22px;left:0;font-size:11px;color:var(--text-muted);font-weight:600;
  }

  .annotation{
    position:absolute;border:1.5px solid transparent;
  }
  .annotation.text-ann{
    background:transparent;color:black;font-family:inherit;font-size:14px;
    padding:2px 4px;min-width:60px;outline:1.5px dashed rgba(0,0,0,0.3);
  }
  .annotation.text-ann[contenteditable="true"]{outline-color:var(--accent)}
  .annotation.highlight-ann{
    background:rgba(252,211,77,0.5);pointer-events:none;
  }
  .annotation.strike-ann{
    background:transparent;border-top:2px solid red;height:2px;pointer-events:none;
  }
  .annotation.rect-ann{
    border:2px solid red;background:transparent;pointer-events:none;
  }
  .annotation.del-btn{
    position:absolute;top:-10px;right:-10px;width:18px;height:18px;background:var(--danger);
    color:white;border:none;border-radius:50%;cursor:pointer;font-size:11px;line-height:1;
    display:flex;align-items:center;justify-content:center;z-index:10;
  }

  .color-picker{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
  .color-swatch{width:22px;height:22px;border-radius:4px;border:2px solid white;cursor:pointer;box-shadow:0 0 0 1px var(--border)}
  .color-swatch.active{box-shadow:0 0 0 2px var(--accent)}
</style>
</head>
<body>
<div id="app-nav"></div>
<div class="container">
  <section class="tool-hero">
    <span class="eyebrow">✏️ Editor</span>
    <h1>Editor de PDF</h1>
    <p>Adicione texto, destaque trechos, risque com tarja, desenhe retângulos. Edite o PDF antes de enviar.</p>
  </section>

  <div class="card" style="margin-bottom:14px">
    <label for="fileInput" class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      </div>
      <div class="drop-title">Arraste o PDF para editar</div>
      <div class="drop-sub">Aceita 1 arquivo PDF</div>
    </label>
    <input type="file" id="fileInput" accept="application/pdf">
  </div>

  <div id="editorBlock" style="display:none">
    <div class="editor-shell">
      <div class="toolbar">
        <h4>Ferramentas</h4>
        <button class="tool-btn active" data-tool="select"><span class="icon">👆</span> Selecionar</button>
        <button class="tool-btn" data-tool="text"><span class="icon">📝</span> Texto</button>
        <button class="tool-btn" data-tool="highlight"><span class="icon">🟨</span> Destacar</button>
        <button class="tool-btn" data-tool="strike"><span class="icon">━</span> Riscar</button>
        <button class="tool-btn" data-tool="rect"><span class="icon">▭</span> Retângulo</button>

        <h4>Cor</h4>
        <div class="color-picker" id="colorPicker">
          <div class="color-swatch active" data-color="#fcd34d" style="background:#fcd34d"></div>
          <div class="color-swatch" data-color="#ef4444" style="background:#ef4444"></div>
          <div class="color-swatch" data-color="#10b981" style="background:#10b981"></div>
          <div class="color-swatch" data-color="#3b82f6" style="background:#3b82f6"></div>
          <div class="color-swatch" data-color="#0f172a" style="background:#0f172a"></div>
        </div>

        <h4>Ações</h4>
        <button class="tool-btn" id="undoBtn"><span class="icon">↶</span> Desfazer</button>
        <button class="tool-btn" id="clearBtn" style="color:var(--danger)"><span class="icon">🗑️</span> Limpar tudo</button>

        <h4>Salvar</h4>
        <button class="tool-btn" id="saveBtn" style="background:var(--accent);color:white;border:none;justify-content:center"><span class="icon">💾</span> Baixar PDF</button>
      </div>

      <div class="canvas-area" id="canvasArea"></div>
    </div>
  </div>

  <div class="status" id="status">
    <div class="status-text">Aguardando…</div>
    <div class="progress"><div class="progress-bar"></div></div>
  </div>
</div>
<div id="app-footer"></div>

<script src="/assets/shared.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const editorBlock = document.getElementById('editorBlock');
const canvasArea = document.getElementById('canvasArea');
const statusEl = document.getElementById('status');

let pdfBuffer = null;
let pdfFile = null;
let pageDims = []; // [{ pdfW, pdfH, viewW, viewH }]
let activeTool = 'select';
let activeColor = '#fcd34d';
let annotations = []; // { type, page, x, y, w, h, text, color }

document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tool-btn[data-tool]').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  activeTool = b.dataset.tool;
}));

document.querySelectorAll('.color-swatch').forEach(s => s.addEventListener('click', () => {
  document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
  s.classList.add('active');
  activeColor = s.dataset.color;
}));

setupDropZone(dropZone, fileInput, async newFiles => {
  pdfFile = newFiles[0];
  if (!pdfFile) return;
  pdfBuffer = await pdfFile.arrayBuffer();
  await renderPages();
  editorBlock.style.display = 'block';
});

async function renderPages() {
  showStatus(statusEl, 'Renderizando páginas…');
  setProgress(statusEl, 20);
  canvasArea.innerHTML = '';
  pageDims = [];
  const pdf = await pdfjsLib.getDocument({ data: pdfBuffer.slice(0) }).promise;
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const scale = 1.5;
    const viewport = page.getViewport({ scale });
    const wrap = document.createElement('div');
    wrap.className = 'page-wrap';
    wrap.dataset.page = i;
    wrap.style.width = viewport.width + 'px';
    wrap.style.height = viewport.height + 'px';
    wrap.innerHTML = `<div class="page-num">Página ${i}</div><canvas></canvas>`;
    canvasArea.appendChild(wrap);
    const cv = wrap.querySelector('canvas');
    cv.width = viewport.width;
    cv.height = viewport.height;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, cv.width, cv.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    const pdfViewport = page.getViewport({ scale: 1 });
    pageDims.push({ pdfW: pdfViewport.width, pdfH: pdfViewport.height, viewW: viewport.width, viewH: viewport.height });

    // Adiciona handlers
    let drawing = null;
    wrap.addEventListener('mousedown', e => {
      if (activeTool === 'select') return;
      const rect = wrap.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (activeTool === 'text') {
        const ann = createAnnotation(i, 'text', x, y, 100, 24, '', activeColor);
        const el = ann.el;
        el.contentEditable = 'true';
        el.focus();
        return;
      }
      drawing = { type: activeTool, page: i, x0: x, y0: y };
    });
    wrap.addEventListener('mousemove', e => {
      if (!drawing) return;
      // Não desenha em tempo real pra simplificar (V1)
    });
    wrap.addEventListener('mouseup', e => {
      if (!drawing) return;
      const rect = wrap.getBoundingClientRect();
      const x1 = e.clientX - rect.left;
      const y1 = e.clientY - rect.top;
      const x = Math.min(drawing.x0, x1);
      const y = Math.min(drawing.y0, y1);
      const w = Math.abs(x1 - drawing.x0);
      const h = Math.abs(y1 - drawing.y0);
      if (drawing.type === 'highlight' && w > 5 && h > 5) {
        createAnnotation(i, 'highlight', x, y, w, h, '', activeColor);
      } else if (drawing.type === 'rect' && w > 5 && h > 5) {
        createAnnotation(i, 'rect', x, y, w, h, '', activeColor);
      } else if (drawing.type === 'strike' && w > 10) {
        createAnnotation(i, 'strike', x, drawing.y0, w, 2, '', activeColor);
      }
      drawing = null;
    });
  }
  setProgress(statusEl, 100);
  showStatus(statusEl, '✓ PDF carregado. Use as ferramentas no painel esquerdo.', 'success');
}

function createAnnotation(page, type, x, y, w, h, text, color) {
  const ann = { type, page, x, y, w, h, text, color, id: Date.now() + Math.random() };
  annotations.push(ann);
  const wrap = canvasArea.querySelector(`.page-wrap[data-page="${page}"]`);
  const el = document.createElement('div');
  el.className = `annotation ${type}-ann`;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  if (type !== 'text') {
    el.style.width = w + 'px';
    el.style.height = h + 'px';
  }
  if (type === 'highlight') el.style.background = hexToRgba(color, 0.5);
  if (type === 'strike') el.style.borderTopColor = color;
  if (type === 'rect') el.style.borderColor = color;
  if (type === 'text') {
    el.textContent = text;
    el.style.color = color;
    el.addEventListener('blur', () => { ann.text = el.textContent; ann.w = el.offsetWidth; ann.h = el.offsetHeight; el.contentEditable = 'false'; });
    el.addEventListener('click', e => {
      if (activeTool === 'select') {
        el.contentEditable = 'true';
        el.focus();
      }
    });
  }
  // Botão de remover
  const del = document.createElement('button');
  del.className = 'annotation del-btn';
  del.textContent = '×';
  del.title = 'Remover';
  del.style.left = (type === 'text' ? '100%' : (w - 6) + 'px');
  del.addEventListener('click', e => {
    e.stopPropagation();
    annotations = annotations.filter(a => a.id !== ann.id);
    el.remove();
  });
  el.appendChild(del);
  wrap.appendChild(el);
  ann.el = el;
  return ann;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

document.getElementById('undoBtn').addEventListener('click', () => {
  if (!annotations.length) return;
  const last = annotations.pop();
  if (last.el) last.el.remove();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Remover todas as anotações?')) return;
  annotations.forEach(a => a.el && a.el.remove());
  annotations = [];
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  showStatus(statusEl, 'Aplicando edições no PDF…');
  setProgress(statusEl, 30);
  try {
    const out = await PDFLib.PDFDocument.load(pdfBuffer.slice(0), { ignoreEncryption: true });
    const font = await out.embedFont(PDFLib.StandardFonts.Helvetica);
    const fontBold = await out.embedFont(PDFLib.StandardFonts.HelveticaBold);
    const pages = out.getPages();

    for (const a of annotations) {
      const dims = pageDims[a.page - 1];
      const page = pages[a.page - 1];
      const { width: pw, height: ph } = page.getSize();
      const sx = pw / dims.viewW;
      const sy = ph / dims.viewH;
      const x = a.x * sx;
      const w = a.w * sx;
      const h = a.h * sy;
      const yPdf = ph - (a.y * sy) - h; // converte top-left view -> bottom-left PDF
      const color = hexToRgb01(a.color);

      if (a.type === 'highlight') {
        page.drawRectangle({ x, y: yPdf, width: w, height: h, color: PDFLib.rgb(...color), opacity: 0.4 });
      } else if (a.type === 'rect') {
        page.drawRectangle({ x, y: yPdf, width: w, height: h, borderColor: PDFLib.rgb(...color), borderWidth: 1.5 });
      } else if (a.type === 'strike') {
        const ys = ph - (a.y * sy);
        page.drawLine({ start: { x, y: ys }, end: { x: x + w, y: ys }, color: PDFLib.rgb(...color), thickness: 2 });
      } else if (a.type === 'text' && a.text) {
        const fs = 12;
        page.drawText(a.text, { x, y: ph - (a.y * sy) - fs, size: fs, font, color: PDFLib.rgb(...color) });
      }
    }

    setProgress(statusEl, 90);
    const bytes = await out.save();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const baseName = pdfFile.name.replace(/\.pdf$/i, '');
    downloadBlob(blob, `${baseName}_editado.pdf`);

    setProgress(statusEl, 100);
    showStatus(statusEl, `✓ Pronto! ${annotations.length} edição${annotations.length === 1 ? '' : 'ões'} aplicadas.`, 'success');
    trackUsage('editor-pdf', { annotations: annotations.length });
  } catch (err) {
    console.error(err);
    showStatus(statusEl, 'Erro: ' + err.message, 'error');
    setProgress(statusEl, 0);
  }
});

function hexToRgb01(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  return [r, g, b];
}
</script>
</body>
</html>
