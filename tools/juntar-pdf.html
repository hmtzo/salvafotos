<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juntar PDF — Sindicompany Hub</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/logo.svg">
<link rel="stylesheet" href="/assets/shared.css">
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
<div id="app-nav"></div>
<div class="container">
  <section class="tool-hero">
    <span class="eyebrow">📑 PDF</span>
    <h1>Juntar PDF</h1>
    <p>Combine vários PDFs em um único arquivo. Arraste os arquivos e organize na ordem que você quiser.</p>
  </section>

  <div class="card">
    <label for="fileInput" class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <div class="drop-title">Arraste seus PDFs aqui ou clique para selecionar</div>
      <div class="drop-sub">Aceita 2 ou mais arquivos · processado no seu navegador</div>
    </label>
    <input type="file" id="fileInput" accept="application/pdf" multiple>

    <div class="file-list" id="fileList"></div>

    <button class="btn-primary" id="processBtn" disabled>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
      <span id="btnText">Selecione pelo menos 2 PDFs</span>
    </button>

    <div class="status" id="status">
      <div class="status-text">Aguardando…</div>
      <div class="progress"><div class="progress-bar"></div></div>
    </div>
  </div>
</div>
<div id="app-footer"></div>

<script src="/assets/shared.js"></script>
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const processBtn = document.getElementById('processBtn');
const btnText = document.getElementById('btnText');
const statusEl = document.getElementById('status');

let files = [];

function renderList() {
  if (!files.length) { fileList.innerHTML = ''; updateBtn(); return; }
  fileList.innerHTML = files.map((f, i) => `
    <div class="file-item">
      <div class="file-icon">PDF</div>
      <div class="file-info">
        <div class="file-name">${i + 1}. ${f.name}</div>
        <div class="file-meta">${formatBytes(f.size)}</div>
      </div>
      <div class="file-actions">
        <button class="icon-btn" data-act="up" data-i="${i}" title="Mover pra cima" ${i === 0 ? 'disabled' : ''}>
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
        </button>
        <button class="icon-btn" data-act="down" data-i="${i}" title="Mover pra baixo" ${i === files.length - 1 ? 'disabled' : ''}>
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <button class="icon-btn" data-act="del" data-i="${i}" title="Remover">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>
        </button>
      </div>
    </div>
  `).join('');
  updateBtn();
}

function updateBtn() {
  if (files.length < 2) {
    processBtn.disabled = true;
    btnText.textContent = 'Selecione pelo menos 2 PDFs';
  } else {
    processBtn.disabled = false;
    btnText.textContent = `Juntar ${files.length} PDFs`;
  }
}

fileList.addEventListener('click', e => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const i = parseInt(btn.dataset.i);
  const act = btn.dataset.act;
  if (act === 'del') files.splice(i, 1);
  else if (act === 'up' && i > 0) [files[i-1], files[i]] = [files[i], files[i-1]];
  else if (act === 'down' && i < files.length - 1) [files[i+1], files[i]] = [files[i], files[i+1]];
  renderList();
});

setupDropZone(dropZone, fileInput, addFiles);

function addFiles(newFiles) {
  const pdfs = newFiles.filter(f => f.type === 'application/pdf' || /\.pdf$/i.test(f.name));
  files = files.concat(pdfs);
  renderList();
}

processBtn.addEventListener('click', async () => {
  processBtn.disabled = true;
  btnText.textContent = 'Processando…';
  showStatus(statusEl, 'Lendo PDFs…');
  setProgress(statusEl, 5);

  try {
    const { PDFDocument } = PDFLib;
    const merged = await PDFDocument.create();
    let totalPages = 0;

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      showStatus(statusEl, `Lendo ${i+1}/${files.length}: ${f.name}`);
      setProgress(statusEl, 10 + (i / files.length) * 70);
      const buf = await f.arrayBuffer();
      const src = await PDFDocument.load(buf, { ignoreEncryption: true });
      const pages = await merged.copyPages(src, src.getPageIndices());
      pages.forEach(p => merged.addPage(p));
      totalPages += pages.length;
    }

    showStatus(statusEl, 'Gerando arquivo final…');
    setProgress(statusEl, 90);
    const out = await merged.save();
    const blob = new Blob([out], { type: 'application/pdf' });
    const filename = `juntado_${new Date().toISOString().slice(0,10)}.pdf`;
    downloadBlob(blob, filename);

    setProgress(statusEl, 100);
    showStatus(statusEl, `✓ Pronto! ${files.length} PDFs unidos em ${totalPages} páginas (${formatBytes(blob.size)}).`, 'success');
  } catch (err) {
    console.error(err);
    showStatus(statusEl, 'Erro: ' + err.message, 'error');
    setProgress(statusEl, 0);
  } finally {
    processBtn.disabled = false;
    btnText.textContent = `Juntar ${files.length} PDFs`;
  }
});
</script>
</body>
</html>
