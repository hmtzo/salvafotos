<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sindicompany Hub — Ferramentas internas</title>
<meta name="description" content="Hub de ferramentas internas Sindicompany — PDFs, conversões, geradores e automações para o dia a dia do escritório.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/logo.svg">
<link rel="stylesheet" href="/assets/shared.css">
<style>
  /* ===== Cinematic background (subtle grid + film grain) — DARK ===== */
  body::after{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px) 0 0/60px 60px,
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px) 0 0/60px 60px;
    -webkit-mask-image:radial-gradient(ellipse at center, black 0%, transparent 70%);
            mask-image:radial-gradient(ellipse at center, black 0%, transparent 70%);
  }
  .film-grain{
    position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.04;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ===== Hub Hero — silver matte typography (dark) ===== */
  .hub-hero{padding:48px 0 36px;text-align:center;position:relative;z-index:2}
  .hub-eyebrow{
    display:inline-block;padding:6px 14px;border-radius:100px;
    background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.08);
    font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;
    color:var(--text-dim);margin-bottom:20px;
    backdrop-filter:blur(20px);
  }
  .hub-hero h1{
    font-size:clamp(40px, 7vw, 78px);
    font-weight:800;letter-spacing:-0.04em;line-height:1;margin-bottom:14px;
  }
  .hub-hero h1 .silver-matte{
    background:linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.4) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    transform:translateZ(0);
    filter:
      drop-shadow(0 10px 20px rgba(255,255,255,0.08))
      drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    display:inline-block;
  }
  .hub-hero h1 .highlight{
    background:linear-gradient(135deg, var(--accent-bright) 0%, var(--info) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    display:inline-block;
  }
  .hub-hero p{
    font-size:17px;color:var(--text-dim);max-width:600px;margin:0 auto;
    line-height:1.5;font-weight:400;
  }

  .search-wrap{max-width:520px;margin:24px auto 8px;position:relative}
  .search-wrap input{
    width:100%;padding:14px 18px 14px 46px;
    border:1.5px solid var(--border);border-radius:12px;
    font-size:15px;font-family:inherit;color:var(--text);
    background:var(--card);transition:all 0.15s;
    box-shadow:var(--shadow);
  }
  .search-wrap input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .search-wrap svg{
    position:absolute;left:16px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;color:var(--text-muted);pointer-events:none;
  }

  /* ===== LimelightNav style category tabs (dark) ===== */
  .category-tabs{
    display:inline-flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:0;
    margin:18px auto 32px;padding:6px 8px;position:relative;
    background:rgba(31,32,35,0.6);border:1px solid rgba(255,255,255,0.06);
    border-radius:14px;backdrop-filter:blur(20px);
    box-shadow:0 4px 20px -4px rgba(0,0,0,0.4);
  }
  .category-tabs-wrap{display:flex;justify-content:center;flex-wrap:wrap}
  .cat-tab{
    position:relative;z-index:2;padding:10px 16px;background:transparent;border:none;
    color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;
    transition:all 0.15s;font-family:inherit;border-radius:10px;
  }
  .cat-tab:hover{color:var(--text)}
  .cat-tab.active{color:var(--text);font-weight:600}
  .limelight{
    position:absolute;top:0;z-index:1;
    width:32px;height:4px;border-radius:999px;background:var(--accent);
    box-shadow:0 0 24px var(--accent), 0 0 8px var(--accent);
    transition:left 0.4s cubic-bezier(.4,1.4,.5,1);
    pointer-events:none;
  }
  .limelight::after{
    content:'';position:absolute;top:4px;left:-40%;width:180%;height:60px;
    clip-path:polygon(5% 100%, 28% 0, 72% 0, 95% 100%);
    background:linear-gradient(180deg, rgba(16,185,129,0.32) 0%, transparent 100%);
    pointer-events:none;
  }

  .tools-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:16px;margin-bottom:40px;position:relative;z-index:2;
  }
  /* ===== GlowCard tool cards (cursor-tracking spotlight, dark) ===== */
  .tool-card{
    --base:220;--spread:200;
    --hue:calc(var(--base) + (var(--xp, 0) * var(--spread)));
    --card-x:-200px;--card-y:-200px;
    background:rgba(31,32,35,0.7);border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;padding:22px;
    text-decoration:none;color:inherit;display:block;
    transition:transform 0.2s cubic-bezier(.4,1.4,.5,1), box-shadow 0.25s;
    cursor:pointer;position:relative;overflow:hidden;
    background-image:
      radial-gradient(
        260px 260px at var(--card-x) var(--card-y),
        hsl(var(--hue) 95% 60% / 0.18),
        transparent 70%
      ),
      linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    backdrop-filter:blur(8px);
  }
  .tool-card.disabled{opacity:0.45;cursor:not-allowed;pointer-events:none}
  .tool-card::before{
    content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    border:1.5px solid transparent;
    background:radial-gradient(
      180px 180px at var(--card-x) var(--card-y),
      hsl(var(--hue) 95% 60% / 0.85),
      transparent 70%
    );
    -webkit-mask:linear-gradient(#000,#000) padding-box, linear-gradient(#000,#000);
            mask:linear-gradient(#000,#000) padding-box, linear-gradient(#000,#000);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
    opacity:0;transition:opacity 0.25s;
  }
  .tool-card:hover:not(.disabled)::before{opacity:1}
  .tool-card:hover:not(.disabled){
    transform:translateY(-3px);
    box-shadow:0 16px 40px -12px hsl(var(--hue) 80% 50% / 0.25),
               0 4px 12px -4px hsl(var(--hue) 80% 50% / 0.15);
  }
  /* hue por categoria */
  .tool-card[data-cat="pdf"]    {--base:0}
  .tool-card[data-cat="image"]  {--base:280}
  .tool-card[data-cat="doc"]    {--base:220}
  .tool-card[data-cat="org"]    {--base:30}
  .tool-card[data-cat="secure"] {--base:140}
  .tool-card[data-cat="ai"]     {--base:320}
  .tool-card[data-cat="calc"]   {--base:170}
  .tool-card[data-cat="convert"]{--base:250}
  .tool-card .tool-icon{
    width:42px;height:42px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:14px;font-size:22px;
  }
  .tool-card .tool-icon svg{width:22px;height:22px}
  .tool-card h3{font-size:15px;font-weight:600;margin-bottom:4px;letter-spacing:-0.01em}
  .tool-card p{font-size:13px;color:var(--text-dim);line-height:1.45}
  .tool-card .tool-badge{
    position:absolute;top:14px;right:14px;
    font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;
    padding:3px 8px;border-radius:100px;
  }
  .tool-card .tool-badge.new{background:var(--accent-glow);color:var(--accent-bright)}
  .tool-card .tool-badge.soon{background:var(--bg-elev);color:var(--text-muted)}

  /* Cores por categoria (dark) */
  .icon-pdf{background:rgba(239,68,68,0.15);color:#fca5a5}
  .icon-image{background:rgba(168,85,247,0.15);color:#c4b5fd}
  .icon-doc{background:rgba(59,130,246,0.15);color:#93c5fd}
  .icon-org{background:rgba(245,158,11,0.15);color:#fcd34d}
  .icon-secure{background:rgba(16,185,129,0.15);color:#6ee7b7}
  .icon-ai{background:rgba(236,72,153,0.15);color:#f9a8d4}
  .icon-calc{background:rgba(20,184,166,0.15);color:#5eead4}
  .icon-convert{background:rgba(99,102,241,0.15);color:#a5b4fc}

  .section-title{
    font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--text-muted);margin:32px 0 14px;
  }

  .empty{
    text-align:center;padding:40px 20px;color:var(--text-muted);
    background:var(--bg-elev);border-radius:var(--radius);
  }

  /* === MOBILE ============================================================ */
  @media (max-width: 640px){
    .hub-hero{padding:20px 0 18px}
    .hub-eyebrow{font-size:10px;padding:5px 12px;margin-bottom:14px}
    .hub-hero h1{font-size:clamp(28px,8vw,36px);line-height:1.05}
    .hub-hero p{font-size:14px}

    .search-wrap{margin:14px auto 6px}
    .search-wrap input{padding:11px 14px 11px 40px;font-size:16px}
    .search-wrap svg{left:12px;width:16px;height:16px}

    /* Tabs com scroll horizontal pra não wrap */
    .category-tabs{
      flex-wrap:nowrap;overflow-x:auto;
      max-width:100vw;margin:8px -14px 18px;padding:5px 14px;
      border-radius:0;border-left:0;border-right:0;
      -webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;
    }
    .category-tabs::-webkit-scrollbar{display:none}
    .cat-tab{padding:8px 12px;font-size:12px;white-space:nowrap;flex-shrink:0;scroll-snap-align:start}

    /* Tools grid: 2 colunas em mobile */
    .tools-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
    .tool-card{padding:14px;border-radius:12px}
    .tool-card .tool-icon{width:34px;height:34px;border-radius:8px;margin-bottom:10px}
    .tool-card .tool-icon svg{width:18px;height:18px}
    .tool-card h3{font-size:13px;margin-bottom:3px;line-height:1.2}
    .tool-card p{font-size:11px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .tool-card .tool-badge{font-size:9px;padding:2px 6px;top:10px;right:10px}
  }
  /* Telas muito pequenas: 1 coluna */
  @media (max-width: 380px){
    .tools-grid{grid-template-columns:1fr}
  }

  /* ========================================================================
     DOCK (macOS-style) — fixo no rodapé com magnificação no hover
     ======================================================================== */
  .dock-spacer{height:120px}
  .dock-wrap{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    z-index:100;pointer-events:none;
    animation:dock-rise 0.6s cubic-bezier(0.2,0.8,0.2,1) 0.3s both;
  }
  @keyframes dock-rise{from{opacity:0;transform:translate(-50%, 80px)}to{opacity:1;transform:translate(-50%, 0)}}
  .dock{
    pointer-events:auto;
    display:flex;align-items:flex-end;gap:8px;
    height:74px;padding:10px 14px 12px;
    background:rgba(31,32,35,0.6);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.08) inset,
      0 12px 40px -8px rgba(0,0,0,0.6),
      0 4px 16px -4px rgba(0,0,0,0.4);
  }

  .dock-item{
    --w:50px;
    width:var(--w);height:var(--w);
    aspect-ratio:1;
    display:flex;align-items:center;justify-content:center;
    border-radius:14px;cursor:pointer;
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border:1px solid rgba(255,255,255,0.08);
    color:#fafafa;text-decoration:none;
    transition:width 0.15s cubic-bezier(0.2,0.8,0.2,1), height 0.15s cubic-bezier(0.2,0.8,0.2,1), transform 0.2s cubic-bezier(0.2,0.8,0.2,1);
    position:relative;flex-shrink:0;
    will-change:width, height, transform;
  }
  .dock-item:hover{transform:translateY(-10px)}
  .dock-item:active{transform:translateY(-2px) scale(0.95)}
  .dock-item svg{width:48%;height:48%;flex-shrink:0;transition:transform 0.2s}
  .dock-item:hover svg{transform:scale(1.1)}

  /* Tints por categoria */
  .dock-item.ai     {background:linear-gradient(135deg, #ec4899, #db2777)}
  .dock-item.doc    {background:linear-gradient(135deg, #3b82f6, #2563eb)}
  .dock-item.pdf    {background:linear-gradient(135deg, #ef4444, #dc2626)}
  .dock-item.org    {background:linear-gradient(135deg, #f59e0b, #d97706)}
  .dock-item.calc   {background:linear-gradient(135deg, #14b8a6, #0d9488)}
  .dock-item.convert{background:linear-gradient(135deg, #6366f1, #4f46e5)}
  .dock-item.image  {background:linear-gradient(135deg, #a855f7, #9333ea)}
  .dock-item.secure {background:linear-gradient(135deg, #10b981, #059669)}
  .dock-item.dash   {background:linear-gradient(135deg, #64748b, #475569)}

  /* Shine */
  .dock-item::before{
    content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(135deg, rgba(255,255,255,0.18), transparent 50%);
    opacity:0.3;transition:opacity 0.2s;
  }
  .dock-item:hover::before{opacity:0.5}

  /* Active dot */
  .dock-item::after{
    content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
    width:4px;height:4px;border-radius:50%;
    background:rgba(255,255,255,0.6);
    opacity:0;transition:opacity 0.2s;
  }
  .dock-item:active::after{opacity:1}

  /* Tooltip */
  .dock-item .dock-tip{
    position:absolute;bottom:calc(100% + 14px);left:50%;transform:translateX(-50%) translateY(6px);
    background:rgba(0,0,0,0.85);color:#fafafa;
    padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;
    white-space:nowrap;pointer-events:none;
    opacity:0;transition:opacity 0.2s, transform 0.2s;
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.1);
  }
  .dock-item:hover .dock-tip{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Mobile: dock estática (sem magnificação) e scroll horizontal */
  @media (max-width: 768px){
    .dock-spacer{height:84px}
    .dock-wrap{bottom:10px;left:8px;right:8px;transform:none}
    .dock{
      height:60px;padding:8px 10px;border-radius:18px;
      overflow-x:auto;-webkit-overflow-scrolling:touch;
      scroll-snap-type:x mandatory;
      max-width:100%;
    }
    .dock::-webkit-scrollbar{display:none}
    .dock-item{--w:44px;border-radius:12px;scroll-snap-align:start}
    .dock-item:hover{transform:none}
    .dock-item .dock-tip{display:none}
  }
</style>
</head>
<body>

<div class="film-grain"></div>
<div id="app-nav" data-hub="self"></div>

<div class="container">

  <section class="hub-hero">
    <span class="hub-eyebrow">Sindicompany Hub · Uso interno</span>
    <h1>
      <span class="silver-matte">Ferramentas para o</span><br>
      <span class="highlight">dia a dia do escritório</span>
    </h1>
    <p>26 ferramentas, IA integrada, processado direto no navegador. Tudo num só lugar.</p>

    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" id="search" placeholder="Buscar ferramenta…" autocomplete="off">
    </div>

    <div class="category-tabs-wrap">
      <div class="category-tabs" id="catTabs">
        <button class="cat-tab active" data-cat="all">Todas</button>
        <button class="cat-tab" data-cat="ai">IA</button>
        <button class="cat-tab" data-cat="doc">Documentos</button>
        <button class="cat-tab" data-cat="calc">Cálculos</button>
        <button class="cat-tab" data-cat="convert">Conversões</button>
        <button class="cat-tab" data-cat="pdf">PDF</button>
        <button class="cat-tab" data-cat="image">Imagens</button>
        <button class="cat-tab" data-cat="org">Organização</button>
        <button class="cat-tab" data-cat="secure">Segurança</button>
        <div class="limelight" id="limelight"></div>
      </div>
    </div>
  </section>

  <div class="tools-grid" id="toolsGrid"></div>

  <div class="dock-spacer"></div>
</div>

<div class="dock-wrap" aria-label="Atalhos rápidos">
  <div class="dock" id="hubDock"></div>
</div>

<div id="app-footer"></div>

<script src="/assets/shared.js"></script>
<script>
// === Lucide-style icon paths (24x24, stroke-currentColor, stroke-width=1.75) ===
const ICONS = {

function svg(name, size = 22) {

}

const grid = document.getElementById('toolsGrid');
const search = document.getElementById('search');
const catTabs = document.getElementById('catTabs');
let currentCat = 'all';

function renderTools() {
  const q = search.value.trim().toLowerCase();
  const filtered = TOOLS.filter(t => {
    const matchCat = currentCat === 'all' || t.cat === currentCat;
    const matchQ = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">Nenhuma ferramenta encontrada.</div>';
    return;
  }

  // Separa disponíveis e em breve
  const ready = filtered.filter(t => !t.disabled);
  const soon = filtered.filter(t => t.disabled);
  let html = '';
  if (ready.length) {
    html += ready.map(toolCard).join('');
  }
  if (soon.length) {
    html += `<div style="grid-column:1/-1" class="section-title">Em breve</div>`;
    html += soon.map(toolCard).join('');
  }
  grid.innerHTML = html;
}

function toolCard(t) {
  const href = t.disabled ? '#' : `/tools/${t.slug}.html`;
  const badge = t.badge ? `<span class="tool-badge ${t.badge}">${t.badge === 'new' ? 'novo' : 'em breve'}</span>` : '';
  return `
    <a href="${href}" class="tool-card ${t.disabled ? 'disabled' : ''}" data-cat="${t.cat}">
      ${badge}
      <div class="tool-icon ${t.iconClass}">${svg(t.icon, 22)}</div>
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
    </a>
  `;
}

// ===== GlowCard: cursor-tracking spotlight nos tool cards =====
document.addEventListener('pointermove', e => {
  document.querySelectorAll('.tool-card').forEach(card => {
    const r = card.getBoundingClientRect();
    if (e.clientX < r.left - 100 || e.clientX > r.right + 100 ||
        e.clientY < r.top - 100  || e.clientY > r.bottom + 100) return;
    card.style.setProperty('--card-x', (e.clientX - r.left) + 'px');
    card.style.setProperty('--card-y', (e.clientY - r.top) + 'px');
    card.style.setProperty('--xp', ((e.clientX - r.left) / r.width).toFixed(2));
  });
});

// ===== LimelightNav: posiciona o glow embaixo da tab ativa =====
function moveLimelight() {
  const limelight = document.getElementById('limelight');
  const active = document.querySelector('.cat-tab.active');
  if (!limelight || !active) return;
  const left = active.offsetLeft + active.offsetWidth/2 - limelight.offsetWidth/2;
  limelight.style.left = left + 'px';
}
window.addEventListener('resize', moveLimelight);

search.addEventListener('input', renderTools);
catTabs.addEventListener('click', e => {
  if (e.target.classList.contains('cat-tab')) {
    catTabs.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentCat = e.target.dataset.cat;
    renderTools();
    moveLimelight();
  }
});

renderTools();
requestAnimationFrame(moveLimelight);

const hubDock = document.getElementById('hubDock');
hubDock.innerHTML = DOCK_ITEMS.map(it => {
  const href = it.href || `/tools/${it.slug}.html`;
  return `<a href="${href}" class="dock-item ${it.cat}" data-slug="${it.slug}">
    <span class="dock-tip">${it.label}</span>
    ${svg(it.icon, 26)}
  </a>`;
}).join('');

// Magnificação por proximidade do cursor (só desktop)
const isDesktop = () => window.matchMedia('(min-width: 769px) and (hover: hover)').matches;
const dockItems = () => hubDock.querySelectorAll('.dock-item');
const BASE = 50, MAX = 78, RADIUS = 140;

function magnify(e) {
  if (!isDesktop()) return;
  dockItems().forEach(item => {
    const r = item.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const dist = Math.abs(e.clientX - cx);
    const t = Math.max(0, 1 - dist / RADIUS);
    const w = BASE + (MAX - BASE) * t;
    item.style.setProperty('--w', w + 'px');
  });
}
function resetDock() {
  dockItems().forEach(item => item.style.setProperty('--w', BASE + 'px'));
}
hubDock.addEventListener('mousemove', magnify);
hubDock.addEventListener('mouseleave', resetDock);
resetDock();
