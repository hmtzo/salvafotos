<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sindicompany Hub — Ferramentas internas</title>
<meta name="description" content="Hub de ferramentas internas Sindicompany — PDFs, conversões, geradores e automações para o dia a dia do escritório.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/logo.svg">
<link rel="stylesheet" href="/assets/shared.css">
<style>
  /* ===== Cinematic background (subtle grid + film grain) — DARK ===== */
  body::after{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px) 0 0/60px 60px,
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px) 0 0/60px 60px;
    -webkit-mask-image:radial-gradient(ellipse at center, black 0%, transparent 70%);
            mask-image:radial-gradient(ellipse at center, black 0%, transparent 70%);
  }
  .film-grain{
    position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.04;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ===== Hub Hero — silver matte typography (dark) ===== */
  .hub-hero{padding:48px 0 36px;text-align:center;position:relative;z-index:2}
  .hub-eyebrow{
    display:inline-block;padding:6px 14px;border-radius:100px;
    background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.08);
    font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;
    color:var(--text-dim);margin-bottom:20px;
    backdrop-filter:blur(20px);
  }
  .hub-hero h1{
    font-size:clamp(40px, 7vw, 78px);
    font-weight:800;letter-spacing:-0.04em;line-height:1;margin-bottom:14px;
  }
  .hub-hero h1 .silver-matte{
    background:linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.4) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    transform:translateZ(0);
    filter:
      drop-shadow(0 10px 20px rgba(255,255,255,0.08))
      drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    display:inline-block;
  }
  .hub-hero h1 .highlight{
    background:linear-gradient(135deg, var(--accent-bright) 0%, var(--info) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    display:inline-block;
  }
  .hub-hero p{
    font-size:17px;color:var(--text-dim);max-width:600px;margin:0 auto;
    line-height:1.5;font-weight:400;
  }
  .hub-mini{
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    margin-top:18px;padding:8px 18px;border-radius:100px;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
    font-size:12.5px;color:var(--text-dim);
    backdrop-filter:blur(12px);
  }
  .hub-mini-item strong{color:var(--text);font-weight:700}
  .hub-mini-sep{opacity:0.4}
  .hub-mini-link{color:#a5b4fc;text-decoration:none;font-weight:600;margin-left:4px}
  .hub-mini-link:hover{color:#fff}
  @media (max-width:640px){
    .hub-mini{font-size:11px;padding:7px 14px;flex-wrap:wrap;gap:6px}
  }

  .search-wrap{max-width:520px;margin:24px auto 8px;position:relative}
  .search-wrap input{
    width:100%;padding:14px 18px 14px 46px;
    border:1.5px solid var(--border);border-radius:12px;
    font-size:15px;font-family:inherit;color:var(--text);
    background:var(--card);transition:all 0.15s;
    box-shadow:var(--shadow);
  }
  .search-wrap input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .search-wrap svg{
    position:absolute;left:16px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;color:var(--text-muted);pointer-events:none;
  }

  /* Wrapper inline da dock (substituiu as tabs de categoria) */
  .mindock-inline{
    display:flex;justify-content:center;
    margin:18px auto 32px;position:relative;z-index:3;
  }

  /* ===== Sindi Hero Card — destaque principal ===== */
  .sindi-hero{
    position:relative;z-index:2;margin:8px auto 28px;max-width:760px;
    background:
      radial-gradient(120% 120% at 0% 0%, rgba(236,72,153,0.18) 0%, transparent 50%),
      radial-gradient(120% 120% at 100% 100%, rgba(99,102,241,0.18) 0%, transparent 50%),
      rgba(31,32,35,0.7);
    border:1px solid rgba(255,255,255,0.1);border-radius:24px;
    padding:32px 36px;backdrop-filter:blur(20px);
    box-shadow:0 24px 60px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    overflow:hidden;
  }
  .sindi-hero::before{
    content:'';position:absolute;top:-40%;right:-20%;width:60%;height:160%;
    background:radial-gradient(closest-side, rgba(236,72,153,0.25), transparent);
    filter:blur(40px);pointer-events:none;
  }
  .sindi-hero-row{display:flex;align-items:center;gap:24px;position:relative;z-index:1}
  .sindi-avatar{
    width:84px;height:84px;border-radius:22px;flex-shrink:0;
    background:linear-gradient(135deg, #ec4899 0%, #6366f1 100%);
    display:flex;align-items:center;justify-content:center;color:white;
    box-shadow:0 12px 32px -8px rgba(236,72,153,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
    position:relative;
  }
  .sindi-avatar::after{
    content:'';position:absolute;inset:-4px;border-radius:26px;
    background:linear-gradient(135deg, #ec4899, #6366f1);
    opacity:0.3;filter:blur(10px);z-index:-1;
    animation:sindi-pulse 3s ease-in-out infinite;
  }
  @keyframes sindi-pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.5;transform:scale(1.05)}}
  .sindi-info{flex:1;min-width:0}
  .sindi-tag{
    display:inline-flex;align-items:center;gap:6px;
    padding:4px 10px;border-radius:100px;
    background:rgba(236,72,153,0.15);border:1px solid rgba(236,72,153,0.3);
    font-size:11px;font-weight:600;color:#f9a8d4;text-transform:uppercase;
    letter-spacing:0.08em;margin-bottom:8px;
  }
  .sindi-tag .dot{width:6px;height:6px;border-radius:50%;background:#10b981;box-shadow:0 0 8px #10b981}
  .sindi-info h2{font-size:28px;font-weight:800;letter-spacing:-0.02em;margin:0 0 6px;line-height:1.1}
  .sindi-info p{font-size:14px;color:var(--text-dim);margin:0;line-height:1.5}
  .sindi-cta{
    margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;position:relative;z-index:1;
  }
  .sindi-btn{
    flex:1;min-width:220px;display:inline-flex;align-items:center;justify-content:center;gap:10px;
    padding:14px 22px;border-radius:14px;font-size:15px;font-weight:600;
    text-decoration:none;transition:all 0.2s;font-family:inherit;cursor:pointer;border:none;
  }
  .sindi-btn.primary{
    background:linear-gradient(135deg, #ec4899 0%, #db2777 100%);
    color:white;box-shadow:0 8px 24px -6px rgba(236,72,153,0.5);
  }
  .sindi-btn.primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px -6px rgba(236,72,153,0.6)}
  .sindi-btn.ghost{
    background:rgba(255,255,255,0.06);color:var(--text);
    border:1px solid rgba(255,255,255,0.12);
  }
  .sindi-btn.ghost:hover{background:rgba(255,255,255,0.1)}
  .sindi-quick{
    margin-top:16px;display:flex;flex-wrap:wrap;gap:8px;position:relative;z-index:1;
  }
  .sindi-quick-chip{
    padding:7px 12px;border-radius:100px;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
    font-size:12px;color:var(--text-dim);cursor:pointer;transition:all 0.15s;
    font-family:inherit;
  }
  .sindi-quick-chip:hover{background:rgba(255,255,255,0.08);color:var(--text);border-color:rgba(255,255,255,0.15)}
  @media (max-width:640px){
    .sindi-hero{padding:22px 20px;margin:0 auto 20px}
    .sindi-hero-row{gap:14px}
    .sindi-avatar{width:60px;height:60px;border-radius:16px}
    .sindi-avatar svg{width:32px;height:32px}
    .sindi-info h2{font-size:20px}
    .sindi-info p{font-size:13px}
    .sindi-btn{min-width:0;width:100%;padding:12px 18px;font-size:14px}
    .sindi-cta{flex-direction:column}
  }

  /* ===== Ferramentas dropdown trigger + panel ===== */
  .tools-trigger-wrap{
    position:relative;z-index:3;max-width:760px;margin:0 auto 28px;
    display:flex;align-items:center;gap:12px;
  }
  .tools-trigger{
    flex:1;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 18px;border-radius:14px;cursor:pointer;font-family:inherit;
    background:rgba(31,32,35,0.7);border:1px solid rgba(255,255,255,0.08);
    color:var(--text);font-size:14px;font-weight:500;
    backdrop-filter:blur(20px);transition:all 0.15s;
  }
  .tools-trigger:hover{border-color:rgba(255,255,255,0.16);background:rgba(31,32,35,0.85)}
  .tools-trigger .trigger-left{display:flex;align-items:center;gap:12px}
  .tools-trigger .trigger-icon{
    width:36px;height:36px;border-radius:10px;flex-shrink:0;
    background:linear-gradient(135deg, #6366f1, #4f46e5);
    display:flex;align-items:center;justify-content:center;color:white;
  }
  .tools-trigger .trigger-label{font-weight:600}
  .tools-trigger .trigger-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
  .tools-trigger .chev{transition:transform 0.25s;color:var(--text-muted)}
  .tools-trigger[aria-expanded="true"] .chev{transform:rotate(180deg)}

  .tools-panel{
    position:relative;z-index:2;max-width:760px;margin:-16px auto 40px;
    background:rgba(20,21,24,0.85);border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;padding:22px;backdrop-filter:blur(24px);
    box-shadow:0 24px 60px -12px rgba(0,0,0,0.7);
    max-height:0;overflow:hidden;opacity:0;
    transition:max-height 0.35s cubic-bezier(.2,.8,.2,1), opacity 0.25s, padding 0.3s, margin 0.3s;
    padding-top:0;padding-bottom:0;
  }
  .tools-panel.open{
    max-height:2400px;opacity:1;padding:22px;margin-bottom:40px;
  }
  @media (max-width:640px){
    .tools-trigger-wrap{margin:0 auto 18px}
    .tools-panel{padding:0 18px;margin:-12px auto 24px}
    .tools-panel.open{padding:18px}
  }

  .tools-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:16px;margin-bottom:0;position:relative;z-index:2;
  }
  /* ===== ServiceCard — bloco colorido com ilustração 3D no canto ===== */
  .tool-card{
    --bg: #1f2023;
    --fg: #fafafa;
    --illust-color: rgba(255,255,255,0.18);
    position:relative;display:flex;flex-direction:column;justify-content:space-between;
    padding:24px;border-radius:18px;overflow:hidden;
    background:var(--bg);color:var(--fg);
    text-decoration:none;cursor:pointer;
    min-height:184px;
    box-shadow:0 1px 2px rgba(0,0,0,0.2);
    transition:transform 0.3s ease-out, box-shadow 0.3s ease-out;
    border:1px solid rgba(255,255,255,0.06);
  }
  .tool-card:hover:not(.disabled){
    transform:scale(1.02) translateY(-2px);
    box-shadow:0 18px 40px -12px rgba(0,0,0,0.55);
  }
  .tool-card.disabled{opacity:0.45;cursor:not-allowed;pointer-events:none}

  .tool-card .tool-content{
    position:relative;z-index:2;display:flex;flex-direction:column;
    height:100%;gap:14px;
    width:62%;
  }
  .tool-card h3{
    font-size:21px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;
    color:var(--fg);margin:0;
  }
  .tool-card p{
    font-size:13px;line-height:1.45;color:var(--fg);opacity:0.8;
    margin:0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .tool-card .tool-cta{
    margin-top:auto;display:inline-flex;align-items:center;gap:6px;
    font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--fg);
  }
  .tool-card .tool-cta svg{
    width:14px;height:14px;
    transition:transform 0.3s ease-in-out;
  }
  .tool-card:hover:not(.disabled) .tool-cta svg{
    animation:cta-arrow 0.7s ease-in-out infinite alternate;
  }
  @keyframes cta-arrow{from{transform:translateX(0)}to{transform:translateX(5px)}}
  .tool-card:hover:not(.disabled) .tool-cta{text-decoration:underline;text-underline-offset:3px}

  /* Ilustração SVG decorativa no canto inferior direito */
  .tool-card .tool-illust{
    position:absolute;right:-18px;bottom:-18px;
    width:140px;height:140px;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;z-index:1;opacity:0.85;
    transition:transform 0.4s cubic-bezier(.34,1.4,.5,1), opacity 0.3s;
  }
  .tool-card .tool-illust svg{
    width:120px;height:120px;
    color:var(--illust-color);
    stroke-width:1.25;
  }
  .tool-card:hover:not(.disabled) .tool-illust{
    opacity:1;
    transform:scale(1.1) rotate(3deg) translateX(10px);
  }

  /* Badge "novo" */
  .tool-card .tool-badge{
    position:absolute;top:14px;right:14px;z-index:3;
    font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
    padding:3px 9px;border-radius:100px;
    background:rgba(255,255,255,0.18);color:#fff;backdrop-filter:blur(8px);
  }

  /* === Variantes por categoria === */
  .tool-card[data-cat="ai"]{
    --bg:linear-gradient(135deg, #ec4899 0%, #db2777 100%);
    --illust-color:rgba(255,255,255,0.32);
  }
  .tool-card[data-cat="doc"]{
    --bg:linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    --illust-color:rgba(255,255,255,0.3);
  }
  .tool-card[data-cat="pdf"]{
    --bg:linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    --illust-color:rgba(255,255,255,0.32);
  }
  .tool-card[data-cat="org"]{
    --bg:linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    --illust-color:rgba(255,255,255,0.32);
  }
  .tool-card[data-cat="calc"]{
    --bg:linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
    --illust-color:rgba(255,255,255,0.3);
  }
  .tool-card[data-cat="convert"]{
    --bg:linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    --illust-color:rgba(255,255,255,0.3);
  }
  .tool-card[data-cat="image"]{
    --bg:linear-gradient(135deg, #a855f7 0%, #9333ea 100%);
    --illust-color:rgba(255,255,255,0.3);
  }
  .tool-card[data-cat="secure"]{
    --bg:linear-gradient(135deg, #10b981 0%, #059669 100%);
    --illust-color:rgba(255,255,255,0.32);
  }

  .section-title{
    font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--text-muted);margin:32px 0 14px;
  }

  .empty{
    text-align:center;padding:40px 20px;color:var(--text-muted);
    background:var(--bg-elev);border-radius:var(--radius);
  }

  /* === MOBILE ============================================================ */
  @media (max-width: 640px){
    .hub-hero{padding:20px 0 18px}
    .hub-eyebrow{font-size:10px;padding:5px 12px;margin-bottom:14px}
    .hub-hero h1{font-size:clamp(28px,8vw,36px);line-height:1.05}
    .hub-hero p{font-size:14px}

    .search-wrap{margin:14px auto 6px}
    .search-wrap input{padding:11px 14px 11px 40px;font-size:16px}
    .search-wrap svg{left:12px;width:16px;height:16px}

    /* Tools grid: 1 coluna em mobile pra ServiceCard respirar */
    .tools-grid{grid-template-columns:1fr;gap:12px;margin-bottom:24px}
    .tool-card{padding:18px;border-radius:14px;min-height:148px}
    .tool-card .tool-content{width:65%;gap:10px}
    .tool-card h3{font-size:18px;line-height:1.1}
    .tool-card p{font-size:12px;-webkit-line-clamp:2}
    .tool-card .tool-cta{font-size:10px}
    .tool-card .tool-illust{width:110px;height:110px;right:-14px;bottom:-14px}
    .tool-card .tool-illust svg{width:96px;height:96px}
    .tool-card .tool-badge{font-size:9px;padding:2px 7px;top:12px;right:12px}
  }
  /* 2 colunas em desktop pequeno (compacto) */
  @media (min-width: 641px) and (max-width: 900px){
    .tools-grid{grid-template-columns:repeat(2,1fr)}
  }

  /* ========================================================================
     MINIMALIST DOCK — inline no hero, glass escuro com hover lift + reflexo
     ======================================================================== */
  .mindock-stack{position:relative;animation:mindock-rise 0.55s cubic-bezier(0.2,0.8,0.2,1) 0.15s both}
  @keyframes mindock-rise{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
  }
  .mindock{
    display:flex;align-items:flex-end;gap:12px;
    padding:14px 22px;border-radius:20px;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 24px 60px -12px rgba(0,0,0,0.7);
    backdrop-filter:blur(20px) saturate(140%);
    -webkit-backdrop-filter:blur(20px) saturate(140%);
    transition:transform 0.5s cubic-bezier(0.2,0.8,0.2,1);
  }
  .mindock-stack.has-hover .mindock{transform:scale(1.04)}

  .mindock-item{
    position:relative;display:flex;align-items:center;justify-content:center;
    width:44px;height:44px;border-radius:12px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    color:#fff;text-decoration:none;cursor:pointer;
    transition:transform 0.3s ease-out, background 0.3s ease-out,
               border-color 0.3s ease-out, box-shadow 0.3s ease-out;
    flex-shrink:0;
  }
  .mindock-item svg{
    width:20px;height:20px;
    transition:transform 0.3s ease-out, filter 0.3s ease-out;
  }
  .mindock-item:hover{
    background:rgba(255,255,255,0.07);
    transform:translateY(-2px) scale(1.05);
  }
  .mindock-item.is-hover{
    background:rgba(255,255,255,0.1);
    border-color:rgba(255,255,255,0.2);
    transform:translateY(-4px) scale(1.1);
    box-shadow:0 4px 24px rgba(255,255,255,0.08);
  }
  .mindock-item.is-hover svg{
    transform:scale(1.05);
    filter:drop-shadow(0 1px 4px rgba(255,255,255,0.1));
  }

  /* Tooltip */
  .mindock-tip{
    position:absolute;bottom:calc(100% + 10px);left:50%;
    transform:translateX(-50%) translateY(4px);
    padding:5px 10px;border-radius:6px;
    background:rgba(0,0,0,0.7);color:#fff;
    font-size:11px;font-weight:400;white-space:nowrap;
    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(8px);
    opacity:0;pointer-events:none;
    transition:opacity 0.2s, transform 0.2s;
  }
  .mindock-tip::after{
    content:'';position:absolute;top:100%;left:50%;
    width:8px;height:8px;background:rgba(0,0,0,0.7);
    transform:translateX(-50%) rotate(45deg);
    margin-top:-4px;
    border-right:1px solid rgba(255,255,255,0.06);
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .mindock-item.is-hover .mindock-tip{
    opacity:1;transform:translateX(-50%) translateY(0);
  }

  /* Reflexo embaixo */
  .mindock-reflection{
    position:absolute;top:100%;left:0;right:0;height:64px;
    overflow:hidden;pointer-events:none;
  }
  .mindock-reflection .mindock-mirror{
    display:flex;align-items:flex-start;gap:12px;
    padding:14px 22px;border-radius:20px;
    background:rgba(0,0,0,0.2);
    border:1px solid rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    opacity:0.3;transform:scaleY(-1);
    transition:transform 0.5s cubic-bezier(0.2,0.8,0.2,1);
  }
  .mindock-stack.has-hover .mindock-mirror{transform:scaleY(-1.05) scale(1.04)}
  .mindock-mirror-item{
    width:48px;height:48px;border-radius:14px;

const grid = document.getElementById('toolsGrid');
const search = document.getElementById('search');

function renderTools() {
  const q = search.value.trim().toLowerCase();
  const filtered = TOOLS.filter(t => {
    return !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q);
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">Nenhuma ferramenta encontrada.</div>';
    return;
  }

  // Separa disponíveis e em breve
  const ready = filtered.filter(t => !t.disabled);
  const soon = filtered.filter(t => t.disabled);
  let html = '';
  if (ready.length) {
    html += ready.map(toolCard).join('');
  }
  if (soon.length) {
    html += `<div style="grid-column:1/-1" class="section-title">Em breve</div>`;
    html += soon.map(toolCard).join('');
  }
  grid.innerHTML = html;
}

function toolCard(t) {
  const href = t.disabled ? '#' : `/tools/${t.slug}.html`;
  const badge = t.badge ? `<span class="tool-badge">${t.badge === 'new' ? 'NOVO' : 'EM BREVE'}</span>` : '';
  const arrowSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
  return `
    <a href="${href}" class="tool-card ${t.disabled ? 'disabled' : ''}" data-cat="${t.cat}">
      ${badge}
      <div class="tool-content">
        <h3>${t.name}</h3>
        <p>${t.desc}</p>
        <span class="tool-cta">Abrir ${arrowSvg}</span>
      </div>
      <div class="tool-illust" aria-hidden="true">${svg(t.icon, 120)}</div>
    </a>
  `;
}

search.addEventListener('input', renderTools);
renderTools();

// ===== Saudação personalizada no hub =====
function getTimeGreeting() {
  const offset = -3 * 60;
  const local = new Date(Date.now() + (new Date().getTimezoneOffset() + offset) * 60000);
  const h = local.getHours();
  if (h >= 5 && h < 12) return 'Bom dia';
  if (h >= 12 && h < 18) return 'Boa tarde';
  return 'Boa noite';
}

(async function personalizeHub() {
  try {
    const res = await fetch('/api/sindi-os?action=me-stats');
    if (!res.ok) return;
    const s = await res.json();
    const firstName = s.profile?.name?.trim().split(/\s+/)[0];
    const eyebrow = document.getElementById('hubEyebrowText');
    const headline = document.getElementById('hubHeadline');
    const subline = document.getElementById('hubSubline');
    const mini = document.getElementById('hubMini');

    if (firstName) {
      // Personaliza headline
      eyebrow.textContent = `${getTimeGreeting()}, ${firstName}`;
      headline.innerHTML = `
        <span class="silver-matte">O que vamos resolver</span><br>
        <span class="highlight">hoje?</span>
      `;
      const condos = s.profile?.condos
        ? `${s.profile.condos.length > 60 ? 'Suas operações' : s.profile.condos} ao alcance.`
        : 'Tudo num só lugar.';
      subline.textContent = condos + ' Use a busca, escolha uma ferramenta ou converse com a Sindi.';
    } else {
      eyebrow.textContent = `${getTimeGreeting()} · Sindicompany Hub`;
    }

    // Mini-stats
    document.getElementById('miniToday').textContent = s.today || 0;
    document.getElementById('miniConvs').textContent = s.conversationsCount || 0;
    mini.hidden = false;
  } catch (e) {}
})();

// Atalho "/" foca a busca
document.addEventListener('keydown', e => {
  if (e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

mindockMirror.innerHTML = MINDOCK_ITEMS.map(it => `
  <div class="mindock-mirror-item" data-id="${it.id}">${svg(it.icon, 20)}</div>
`).join('');

function setHover(id) {
  mindockEl.querySelectorAll('.mindock-item').forEach(el => {
    el.classList.toggle('is-hover', el.dataset.id === id);
  });
  mindockMirror.querySelectorAll('.mindock-mirror-item').forEach(el => {
    el.classList.toggle('is-hover', el.dataset.id === id);
  });
  mindockStack.classList.toggle('has-hover', !!id);
}

mindockEl.querySelectorAll('.mindock-item').forEach(el => {
  el.addEventListener('mouseenter', () => setHover(el.dataset.id));
  el.addEventListener('mouseleave', () => setHover(null));
});
