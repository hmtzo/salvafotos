<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Entrar — Sindicompany Hub</title>
<meta name="description" content="Acesso ao hub interno Sindicompany">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/assets/brand/icon-color.png">
<style>
  :root{
    --bg:#0a0a0c;
    --fg:#fafafa;
    --fg-dim:#a1a1aa;
    --fg-muted:#71717a;
    --primary:#6366f1;
    --primary-hover:#818cf8;
    --secondary:#84c7d3;
    --danger:#ef4444;
    --card-bg:rgba(24,24,27,0.6);
    --border:rgba(250,250,250,0.08);
    --input-bg:rgba(255,255,255,0.03);
    --input-border:rgba(255,255,255,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--fg)}
  body{
    font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;position:relative;overflow:hidden;
  }
  /* Aurora background */
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 1000px 600px at 20% 0%, rgba(99,102,241,0.15), transparent 60%),
      radial-gradient(ellipse 800px 500px at 80% 100%, rgba(132,199,211,0.08), transparent 70%);
  }
  /* Subtle grid */
  body::after{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-size:60px 60px;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    -webkit-mask-image:radial-gradient(ellipse at center, black 0%, transparent 70%);
            mask-image:radial-gradient(ellipse at center, black 0%, transparent 70%);
  }

  /* Particle canvas */
  .particles-canvas{
    position:fixed;inset:0;z-index:1;pointer-events:none;
  }

  /* Login card */
  .login-card{
    position:relative;z-index:10;width:100%;max-width:420px;
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:24px;
    padding:42px 36px 32px;
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.05) inset,
      0 30px 80px -20px rgba(0,0,0,0.7),
      0 12px 30px -10px rgba(0,0,0,0.5);
    animation:card-in 0.7s cubic-bezier(0.2,0.8,0.2,1) both;
  }
  @keyframes card-in{
    from{opacity:0;transform:translateY(24px) scale(0.96)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }

  .brand{display:flex;justify-content:center;margin-bottom:24px}
  .brand img{height:40px;width:auto;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}

  .login-header{text-align:center;margin-bottom:30px}
  .login-header h1{
    font-size:26px;font-weight:800;letter-spacing:-0.02em;
    background:linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:6px;
  }
  .login-header p{font-size:13px;color:var(--fg-dim);font-weight:400}

  /* Form fields with floating label */
  .login-form{display:flex;flex-direction:column;gap:18px}
  .form-field{
    position:relative;
  }
  .form-field input{
    width:100%;
    padding:18px 14px 8px;
    background:var(--input-bg);
    border:1.5px solid var(--input-border);
    border-radius:12px;
    color:var(--fg);
    font-family:inherit;font-size:14px;font-weight:500;
    outline:none;
    transition:all 0.25s cubic-bezier(0.2,0.8,0.2,1);
  }
  .form-field input:focus{
    border-color:var(--primary);
    background:rgba(99,102,241,0.04);
    box-shadow:0 0 0 4px rgba(99,102,241,0.12);
  }
  .form-field label{
    position:absolute;
    left:14px;top:50%;transform:translateY(-50%);
    font-size:13px;color:var(--fg-muted);font-weight:500;
    pointer-events:none;
    transition:all 0.2s cubic-bezier(0.2,0.8,0.2,1);
    background:transparent;padding:0 4px;
  }
  .form-field.active label,
  .form-field input:focus + label{
    top:8px;transform:translateY(0);
    font-size:10px;font-weight:700;
    color:var(--primary);
    text-transform:uppercase;letter-spacing:0.08em;
  }
  .form-field.invalid input{border-color:var(--danger);box-shadow:0 0 0 4px rgba(239,68,68,0.12)}
  .form-field.invalid label{color:var(--danger)}
  .form-field .error-message{
    display:block;font-size:11px;color:var(--danger);
    margin-top:6px;margin-left:4px;font-weight:500;
  }

  .toggle-password{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:transparent;border:none;cursor:pointer;
    color:var(--fg-muted);padding:6px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    transition:color 0.2s, background 0.2s;
  }
  .toggle-password:hover{color:var(--fg);background:rgba(255,255,255,0.04)}
  .toggle-password svg{width:18px;height:18px}

  .form-options{
    display:flex;align-items:center;justify-content:space-between;
    font-size:12px;
  }
  .remember-me{
    display:flex;align-items:center;gap:8px;cursor:pointer;
    color:var(--fg-dim);font-weight:500;user-select:none;
  }
  .remember-me input{
    appearance:none;-webkit-appearance:none;
    width:16px;height:16px;border:1.5px solid var(--input-border);
    border-radius:5px;cursor:pointer;
    transition:all 0.2s;position:relative;
    background:var(--input-bg);
  }
  .remember-me input:checked{
    background:var(--primary);border-color:var(--primary);
  }
  .remember-me input:checked::after{
    content:'';position:absolute;left:4px;top:1px;
    width:5px;height:9px;
    border:solid white;border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  .forgot-password{color:var(--fg-dim);text-decoration:none;font-weight:500;transition:color 0.15s}
  .forgot-password:hover{color:var(--fg)}

  .login-button{
    width:100%;padding:14px;
    background:linear-gradient(180deg, var(--primary) 0%, var(--primary-hover) 100%);
    color:#fff;border:none;border-radius:12px;
    font-family:inherit;font-size:14px;font-weight:700;
    cursor:pointer;letter-spacing:-0.01em;
    transition:all 0.25s cubic-bezier(0.2,0.8,0.2,1);
    box-shadow:
      0 8px 20px -4px rgba(99,102,241,0.5),
      inset 0 1px 0 rgba(255,255,255,0.2);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .login-button:hover:not(:disabled){
    transform:translateY(-1px);
    box-shadow:0 14px 32px -6px rgba(99,102,241,0.65), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .login-button:active:not(:disabled){transform:translateY(0)}
  .login-button:disabled{opacity:0.6;cursor:not-allowed}
  .login-button svg{width:16px;height:16px}

  .login-form.form-success .login-button{
    background:linear-gradient(180deg, #10b981 0%, #34d399 100%);
    box-shadow:0 14px 32px -6px rgba(16,185,129,0.65);
  }

  .error-banner{
    display:none;margin-top:14px;padding:11px 14px;
    background:rgba(239,68,68,0.08);
    border:1px solid rgba(239,68,68,0.25);
    border-radius:10px;
    color:#fca5a5;font-size:12px;font-weight:500;text-align:center;
  }
  .error-banner.show{display:block;animation:shake 0.4s}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-4px)}
    75%{transform:translateX(4px)}
  }

  .footer-info{
    margin-top:24px;padding-top:24px;
    border-top:1px solid var(--border);
    text-align:center;font-size:11px;color:var(--fg-muted);
    line-height:1.55;letter-spacing:0.02em;
  }
  .footer-info strong{color:var(--fg-dim);font-weight:600}

  .back-link{
    position:fixed;top:24px;left:24px;z-index:20;
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 14px;border-radius:100px;
    background:rgba(24,24,27,0.6);border:1px solid var(--border);
    color:var(--fg-dim);text-decoration:none;
    font-size:12px;font-weight:600;
    backdrop-filter:blur(20px);
    transition:all 0.2s;
  }
  .back-link:hover{color:var(--fg);border-color:rgba(255,255,255,0.2)}
  .back-link svg{width:14px;height:14px}

  /* === MOBILE ============================================================ */
  @media (max-width: 640px){
    body{padding:14px;align-items:flex-start;padding-top:72px}
    .login-card{padding:30px 22px 26px;border-radius:20px;max-width:100%}
    .brand img{height:34px}
    .login-header{margin-bottom:22px}
    .login-header h1{font-size:22px;margin-bottom:4px}
    .login-header p{font-size:12px}
    .login-form{gap:14px}
    .form-field input{font-size:16px;padding:18px 14px 8px}  /* 16px evita zoom no iOS */
    .form-options{font-size:11px}
    .login-button{padding:13px;font-size:13px}
    .footer-info{margin-top:20px;padding-top:20px;font-size:10px}
    .back-link{top:14px;left:14px;padding:7px 12px;font-size:11px}
  }
</style>
</head>
<body>
<canvas id="particles" class="particles-canvas"></canvas>

<a href="/" class="back-link">
  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Voltar
</a>

<div class="login-card">
  <div class="brand">
    <img src="/assets/brand/logo-white-v2.png" alt="Sindicompany">
  </div>

  <div class="login-header">
    <h1>Bem-vindo</h1>
    <p>Acesse o hub interno Sindicompany</p>
  </div>

  <form class="login-form" id="loginForm" autocomplete="on">
    <div class="form-field" id="emailField">
      <input type="text" id="user" name="user" autocomplete="username" required>
      <label for="user">Usuário ou e-mail</label>
    </div>

    <div class="form-field" id="passField">
      <input type="password" id="pass" name="pass" autocomplete="current-password" required>
      <label for="pass">Senha</label>
      <button type="button" class="toggle-password" id="togglePass" aria-label="Mostrar senha">
        <svg id="eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="form-options">
      <label class="remember-me">
        <input type="checkbox" id="remember" checked>
        Manter conectado por 30 dias
      </label>
    </div>

    <button type="submit" class="login-button" id="submitBtn">
      <span id="btnText">Entrar</span>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>

    <div class="error-banner" id="errorBanner"></div>
  </form>

  <div class="footer-info">
    Acesso restrito a colaboradores Sindicompany.<br>
    <strong>Em caso de dúvidas, contate o administrador.</strong>
  </div>
</div>

<script>
// === Particle background ===
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() {
    this.reset();
    this.y = Math.random() * canvas.height;
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.4 + 0.1;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0) this.x = canvas.width;
    if (this.x > canvas.width) this.x = 0;
    if (this.y < 0) this.y = canvas.height;
    if (this.y > canvas.height) this.y = 0;
  }
  draw() {
    ctx.fillStyle = `rgba(180, 200, 255, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}
const particles = [];
const isMobile = window.innerWidth < 768;
const count = isMobile
  ? Math.min(30, Math.floor((canvas.width * canvas.height) / 35000))
  : Math.min(80, Math.floor((canvas.width * canvas.height) / 18000));
for (let i = 0; i < count; i++) particles.push(new Particle());

(function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) { p.update(); p.draw(); }
  requestAnimationFrame(animate);
})();

// === Floating label trigger ===
function setupField(fieldId, inputId) {
  const field = document.getElementById(fieldId);
  const input = document.getElementById(inputId);
  function update() {
    if (input.value) field.classList.add('active');
    else field.classList.remove('active');
  }
  input.addEventListener('input', update);
  input.addEventListener('blur', update);
  update();
}
setupField('emailField', 'user');
setupField('passField', 'pass');

// === Show/hide password ===
const passInput = document.getElementById('pass');
const togglePass = document.getElementById('togglePass');
const eyeIcon = document.getElementById('eyeIcon');
const eyeOpen = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
const eyeOff  = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>';
togglePass.addEventListener('click', () => {
  const isPwd = passInput.type === 'password';
  passInput.type = isPwd ? 'text' : 'password';
  eyeIcon.innerHTML = isPwd ? eyeOff : eyeOpen;
  togglePass.setAttribute('aria-label', isPwd ? 'Ocultar senha' : 'Mostrar senha');
});

// === Form submission ===
const form = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const errorBanner = document.getElementById('errorBanner');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBanner.classList.remove('show');
  submitBtn.disabled = true;
  btnText.textContent = 'Entrando…';

  const user = document.getElementById('user').value.trim();
  const pass = document.getElementById('pass').value;
  const remember = document.getElementById('remember').checked;

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass, remember }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');

    form.classList.add('form-success');
    btnText.textContent = '✓ Bem-vindo!';

    setTimeout(() => {
      const params = new URLSearchParams(location.search);
      const next = params.get('next') || '/hub.html';
      location.href = next;
    }, 400);
  } catch (err) {
    errorBanner.textContent = err.message;
    errorBanner.classList.add('show');
    submitBtn.disabled = false;
    btnText.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
